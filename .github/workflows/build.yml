name: Build LarpMedia Electron Player

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Clean Install App Packages
      run: npm ci

    - name: Execute Electron Production Compiler Build
      run: npm run dist

    - name: Upload Finished Windows Installer Binaries
      uses: actions/upload-artifact@v4
      with:
        name: larpmedia-installer-win64
        path: dist/*.exe
        retention-days: 7
