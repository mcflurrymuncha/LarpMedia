name: Build LarpMedia Electron Player

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install App Packages
      run: npm install

    - name: Execute Electron Production Compiler Build
      # Added -c.publish=never to stop the runner from hunting for a GitHub Token
      run: npx electron-builder --win -c.publish=never

    - name: Upload Finished Windows Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: larpmedia-player-win64
        path: |
          dist/*.exe
          dist/win-unpacked/**
        retention-days: 7
